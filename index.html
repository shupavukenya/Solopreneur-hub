<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shupavu Ride - Partner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-12">

    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-10">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="steering-wheel" class="w-6 h-6"></i>
                <span class="font-bold text-lg tracking-wide">Shupavu Ride</span>
            </div>
            <span class="bg-blue-500 text-xs px-2 py-1 rounded-full font-semibold">Partner Panel</span>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h2 class="text-lg font-bold flex items-center gap-2 mb-4">
                <i data-lucide="wallet" class="text-blue-600 w-5 h-5"></i>
                Financial Tracker
            </h2>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100">
                    <span class="text-xs text-emerald-700 font-medium">Total Income</span>
                    <p class="text-lg font-bold text-emerald-800 mt-1" id="total-income">KES 0</p>
                </div>
                <div class="bg-rose-50 p-3 rounded-xl border border-rose-100">
                    <span class="text-xs text-rose-700 font-medium">Total Expenses</span>
                    <p class="text-lg font-bold text-rose-800 mt-1" id="total-expenses">KES 0</p>
                </div>
            </div>

            <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 mb-4 flex justify-between items-center">
                <span class="text-sm font-semibold text-slate-600">Net Balance:</span>
                <span class="text-xl font-extrabold text-blue-700" id="net-balance">KES 0</span>
            </div>

            <div class="space-y-2">
                <div class="flex gap-2">
                    <input type="number" id="tx-amount" placeholder="Amount (KES)" class="w-1/2 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="tx-type" class="w-1/2 px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="income">Income (+)</option>
                        <option value="expense">Expense (-)</option>
                    </select>
                </div>
                <input type="text" id="tx-desc" placeholder="Description (e.g., Fuel, Fare)" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="addTransaction()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-semibold transition-colors">
                    Add Transaction
                </button>
            </div>
        </section>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <i data-lucide="users" class="text-blue-600 w-5 h-5"></i>
                    Client Pipeline
                </h2>
                <button onclick="toggleClientModal()" class="bg-blue-50 hover:bg-blue-100 text-blue-600 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 transition-colors">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add Client
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1">
                        <span class="w-2.5 h-2.5 bg-amber-400 rounded-full"></span> Leads
                    </h3>
                    <div id="leads-list" class="space-y-2 min-h-[50px] bg-slate-50 p-2 rounded-xl border border-dashed border-slate-200">
                        </div>
                </div>

                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1">
                        <span class="w-2.5 h-2.5 bg-blue-500 rounded-full"></span> Active
                    </h3>
                    <div id="active-list" class="space-y-2 min-h-[50px] bg-slate-50 p-2 rounded-xl border border-dashed border-slate-200">
                        </div>
                </div>

                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1">
                        <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></span> Completed
                    </h3>
                    <div id="completed-list" class="space-y-2 min-h-[50px] bg-slate-50 p-2 rounded-xl border border-dashed border-slate-200">
                        </div>
                </div>
            </div>
        </section>

    </main>

    <div id="client-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-sm p-5 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-md font-bold">New Client Lead</h3>
                <button onclick="toggleClientModal()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="space-y-3">
                <input type="text" id="client-name" placeholder="Client Name" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="client-route" placeholder="Route (e.g. Town to Airport)" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="client-quote" placeholder="Quoted Fare (KES)" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="saveClient()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-semibold transition-colors mt-2">
                    Add to Pipeline
                </button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Application State
        let state = {
            transactions: JSON.parse(localStorage.getItem('sr_transactions')) || [],
            clients: JSON.parse(localStorage.getItem('sr_clients')) || []
        };

        // Save State to LocalStorage
        function saveState() {
            localStorage.setItem('sr_transactions', JSON.stringify(state.transactions));
            localStorage.setItem('sr_clients', JSON.stringify(state.clients));
            render();
        }

        // --- Financial Tracker Logic ---
        function addTransaction() {
            const amountInput = document.getElementById('tx-amount');
            const typeInput = document.getElementById('tx-type');
            const descInput = document.getElementById('tx-desc');

            const amount = parseFloat(amountInput.value);
            const type = typeInput.value;
            const desc = descInput.value.trim();

            if (isNaN(amount) || amount <= 0 || !desc) {
                alert("Please fill in all transaction details correctly.");
                return;
            }

            state.transactions.push({ id: Date.now(), amount, type, desc });
            
            // Reset inputs
            amountInput.value = '';
            descInput.value = '';
            
            saveState();
        }

        function calculateFinances() {
            let income = 0;
            let expenses = 0;

            state.transactions.forEach(tx => {
                if (tx.type === 'income') income += tx.amount;
                if (tx.type === 'expense') expenses += tx.amount;
            });

            document.getElementById('total-income').innerText = `KES ${income.toLocaleString()}`;
            document.getElementById('total-expenses').innerText = `KES ${expenses.toLocaleString()}`;
            document.getElementById('net-balance').innerText = `KES ${(income - expenses).toLocaleString()}`;
        }

        // --- CRM Logic ---
        function toggleClientModal() {
            const modal = document.getElementById('client-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        function saveClient() {
            const name = document.getElementById('client-name').value.trim();
            const route = document.getElementById('client-route').value.trim();
            const quote = parseFloat(document.getElementById('client-quote').value);

            if (!name || !route || isNaN(quote)) {
                alert("Please fill in all client details.");
                return;
            }

            state.clients.push({
                id: Date.now(),
                name,
                route,
                quote,
                status: 'lead' // Default status
            });

            // Reset inputs & close modal
            document.getElementById('client-name').value = '';
            document.getElementById('client-route').value = '';
            document.getElementById('client-quote').value = '';
            toggleClientModal();

            saveState();
        }

        function moveClient(id, newStatus) {
            state.clients = state.clients.map(client => {
                if (client.id === id) {
                    client.status = newStatus;
                }
                return client;
            });
            saveState();
        }

        function deleteClient(id) {
            if (confirm("Remove this client from the pipeline?")) {
                state.clients = state.clients.filter(client => client.id !== id);
                saveState();
            }
        }

        // --- Render UI ---
        function render() {
            calculateFinances();

            const leadsContainer = document.getElementById('leads-list');
            const activeContainer = document.getElementById('active-list');
            const completedContainer = document.getElementById('completed-list');

            leadsContainer.innerHTML = '';
            activeContainer.innerHTML = '';
            completedContainer.innerHTML = '';

            state.clients.forEach(client => {
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-lg border border-slate-200 shadow-sm space-y-2 text-xs relative";
                
                // Set Up Action Buttons depending on status
                let actionButtons = '';
                if (client.status === 'lead') {
                    actionButtons = `<button onclick="moveClient(${client.id}, 'active')" class="text-blue-600 font-bold hover:underline">Start Trip &rarr;</button>`;
                } else if (client.status === 'active') {
                    actionButtons = `<button onclick="moveClient(${client.id}, 'completed')" class="text-emerald-600 font-bold hover:underline">Complete &check;</button>`;
                } else if (client.status === 'completed') {
                    actionButtons = `<span class="text-slate-400 font-medium">Job Saved</span>`;
                }

                card.innerHTML = `
                    <button onclick="deleteClient(${client.id})" class="absolute top-2 right-2 text-slate-400 hover:text-rose-500">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                    <div>
                        <p class="font-bold text-sm text-slate-800">${client.name}</p>
                        <p class="text-slate-500">${client.route}</p>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-slate-100">
                        <span class="font-semibold text-slate-700">KES ${client.quote.toLocaleString()}</span>
                        ${actionButtons}
                    </div>
                `;

                if (client.status === 'lead') leadsContainer.appendChild(card);
                if (client.status === 'active') activeContainer.appendChild(card);
                if (client.status === 'completed') completedContainer.appendChild(card);
            });

            // Re-render fresh Lucide Icons in the newly injected HTML
            lucide.createIcons();
        }

        // Initial Page Load Render
        render();
    </script>
</body>
</html>
