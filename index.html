<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoloHub OS - Business Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-md">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                <span class="font-bold text-lg">SoloHub OS</span>
            </div>
            <span class="bg-blue-500 text-xs px-2 py-1 rounded">Kiosk Mode</span>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-md mx-auto px-4 py-6 space-y-6">

        <!-- Financial Tracker Card -->
        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <div class="flex items-center gap-2 text-slate-500">
                <i data-lucide="wallet" class="w-5 h-5"></i>
                <h2 class="text-sm font-semibold uppercase tracking-wider">Financial Tracker</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100">
                    <p class="text-xs text-emerald-600 font-medium">Total Income</p>
                    <p id="totalIncome" class="text-lg font-bold text-emerald-700">KES 0</p>
                </div>
                <div class="bg-rose-50 p-3 rounded-xl border border-rose-100">
                    <p class="text-xs text-rose-600 font-medium">Total Expenses</p>
                    <p id="totalExpenses" class="text-lg font-bold text-rose-700">KES 0</p>
                </div>
            </div>

            <div class="pt-2 border-t border-slate-100 flex justify-between items-center">
                <span class="text-sm font-medium text-slate-500">Net Balance:</span>
                <span id="netBalance" class="text-xl font-extrabold text-slate-900">KES 0</span>
            </div>

            <!-- Add Transaction Form -->
            <div class="space-y-3 pt-2">
                <div class="flex gap-2">
                    <input type="number" id="txAmount" placeholder="Amount (KES)" class="w-1/2 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    <select id="txType" class="w-1/2 px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white">
                        <option value="income">Income (+)</option>
                        <option value="expense">Expense (-)</option>
                    </select>
                </div>
                <input type="text" id="txDesc" placeholder="Description (e.g., Stock, Sale, Rent)" class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <button onclick="addTransaction()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-xl transition duration-200 text-sm">
                    Add Transaction
                </button>
            </div>
        </section>

        <!-- Sales & Customer Pipeline -->
        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2 text-slate-500">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <h2 class="text-sm font-semibold uppercase tracking-wider">Sales Pipeline</h2>
                </div>
                <button onclick="toggleModal(true)" class="text-blue-600 hover:text-blue-700 font-semibold text-xs flex items-center gap-1">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add Deal
                </button>
            </div>

            <!-- Pipeline Swimlanes -->
            <div class="space-y-6">
                <!-- Pending/New Orders -->
                <div>
                    <h3 class="text-xs font-bold text-amber-600 uppercase mb-2 flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-amber-500"></span> Pending / New
                    </h3>
                    <div id="pendingPipeline" class="space-y-2">
                        <!-- Dynamic content -->
                    </div>
                </div>

                <!-- Completed Sales -->
                <div>
                    <h3 class="text-xs font-bold text-emerald-600 uppercase mb-2 flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Completed
                    </h3>
                    <div id="completedPipeline" class="space-y-2">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Modal for New Deal -->
    <div id="dealModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-5 w-full max-w-sm space-y-4 relative">
            <button onclick="toggleModal(false)" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <h3 class="text-base font-bold text-slate-800">New Client / Deal</h3>
            <div class="space-y-3">
                <input type="text" id="dealName" placeholder="Client Name" class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <input type="text" id="dealDetails" placeholder="Items / Service details" class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <input type="number" id="dealValue" placeholder="Deal Value (KES)" class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <button onclick="addDeal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-xl transition duration-200 text-sm">
                    Add to Pipeline
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data States
        let transactions = JSON.parse(localStorage.getItem('solo_txs')) || [];
        let pipeline = JSON.parse(localStorage.getItem('solo_pipeline')) || [];

        // Save & Render Helpers
        function saveData() {
            localStorage.setItem('solo_txs', JSON.stringify(transactions));
            localStorage.setItem('solo_pipeline', JSON.stringify(pipeline));
            renderAll();
        }

        function toggleModal(show) {
            document.getElementById('dealModal').classList.toggle('hidden', !show);
        }

        // Transactions Management
        function addTransaction() {
            const amountInput = document.getElementById('txAmount');
            const typeInput = document.getElementById('txType');
            const descInput = document.getElementById('txDesc');

            const val = parseFloat(amountInput.value);
            const desc = descInput.value.trim();

            if (!val || !desc) {
                alert("Please fill in all transaction fields correctly.");
                return;
            }

            transactions.push({
                id: Date.now(),
                amount: val,
                type: typeInput.value,
                description: desc,
                date: new Date().toLocaleDateString()
            });

            amountInput.value = '';
            descInput.value = '';
            saveData();
        }

        // Pipeline Management
        function addDeal() {
            const name = document.getElementById('dealName').value.trim();
            const details = document.getElementById('dealDetails').value.trim();
            const value = parseFloat(document.getElementById('dealValue').value);

            if (!name || !details || !value) {
                alert("Please complete all deal details.");
                return;
            }

            pipeline.push({
                id: Date.now(),
                name: name,
                details: details,
                value: value,
                status: 'pending'
            });

            document.getElementById('dealName').value = '';
            document.getElementById('dealDetails').value = '';
            document.getElementById('dealValue').value = '';
            toggleModal(false);
            saveData();
        }

        function completeDeal(id) {
            const dealIndex = pipeline.findIndex(d => d.id === id);
            if (dealIndex > -1) {
                const deal = pipeline[dealIndex];
                deal.status = 'completed';
                
                // Automatically register the income
                transactions.push({
                    id: Date.now(),
                    amount: deal.value,
                    type: 'income',
                    description: `Paid: ${deal.name} - ${deal.details}`,
                    date: new Date().toLocaleDateString()
                });

                saveData();
            }
        }

        function deleteDeal(id) {
            pipeline = pipeline.filter(d => d.id !== id);
            saveData();
        }

        // Global Render
        function renderAll() {
            // Render Finances
            let incomeTotal = 0;
            let expenseTotal = 0;

            transactions.forEach(t => {
                if (t.type === 'income') incomeTotal += t.amount;
                else expenseTotal += t.amount;
            });

            const net = incomeTotal - expenseTotal;

            document.getElementById('totalIncome').innerText = `KES ${incomeTotal.toLocaleString()}`;
            document.getElementById('totalExpenses').innerText = `KES ${expenseTotal.toLocaleString()}`;
            document.getElementById('netBalance').innerText = `KES ${net.toLocaleString()}`;

            // Render Pipeline
            const pendingDiv = document.getElementById('pendingPipeline');
            const completedDiv = document.getElementById('completedPipeline');

            pendingDiv.innerHTML = '';
            completedDiv.innerHTML = '';

            pipeline.forEach(deal => {
                const card = document.createElement('div');
                card.className = "bg-slate-50 border border-slate-100 rounded-xl p-3 flex justify-between items-center";
                
                if (deal.status === 'pending') {
                    card.innerHTML = `
                        <div>
                            <p class="text-sm font-bold text-slate-800">${deal.name}</p>
                            <p class="text-xs text-slate-500">${deal.details}</p>
                            <p class="text-xs font-semibold text-blue-600 mt-1">KES ${deal.value.toLocaleString()}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="completeDeal(${deal.id})" class="bg-emerald-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium hover:bg-emerald-700 transition">
                                Complete
                            </button>
                            <button onclick="deleteDeal(${deal.id})" class="text-slate-400 hover:text-rose-600 p-1">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    `;
                    pendingDiv.appendChild(card);
                } else {
                    card.innerHTML = `
                        <div>
                            <p class="text-sm font-semibold text-slate-700 line-through">${deal.name}</p>
                            <p class="text-xs text-slate-400">${deal.details}</p>
                            <p class="text-xs font-semibold text-emerald-600 mt-1">KES ${deal.value.toLocaleString()}</p>
                        </div>
                        <span class="text-emerald-600 text-xs font-bold bg-emerald-50 px-2 py-1 rounded">Paid</span>
                    `;
                    completedDiv.appendChild(card);
                }
            });

            // Re-ender icons
            lucide.createIcons();
        }

        // Initial Boot
        window.onload = renderAll;
    </script>
    <form id="pesapalForm">
 <input type="text" id="first_name" placeholder="First Name" required>
 <input type="text" id="last_name" placeholder="Last Name" required>
 <input type="email" id="email_address" placeholder="Email Address" required>
 <input type="tel" id="phone_number" placeholder="Phone Number" required>
 <input type="number" id="amount" placeholder="Amount" required>
 <input type="hidden" id="currency" value="KES">
 <button type="submit">Pay Now</button>
</form>

<script>
 document.getElementById('pesapalForm').addEventListener('submit', function(e) {
 e.preventDefault();
 const payload = {
 id: "AUTO_GENERATED_ID",
 currency: document.getElementById('currency').value,
 amount: parseFloat(document.getElementById('amount').value).toFixed(2),
 description: "Payment for services",
 callback_url: "https://yourdomain.com/callback",
 notification_id: "",
 branch: "Store Name - HQ",
 billing_address: {
 email_address: document.getElementById('email_address').value,
 phone_number: document.getElementById('phone_number').value,
 country_code: "KE",
 first_name: document.getElementById('first_name').value,
 middle_name: "",
 last_name: document.getElementById('last_name').value
 }
 };
 console.log('JSON Payload:', JSON.stringify(payload));
 });
</script>

</body>
</html>
