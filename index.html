<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline & Payment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="max-w-4xl mx-auto p-6">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800">Deal Management Portal</h1>
            <p class="text-gray-600">Add new deals and process secure payments via PesaPal</p>
        </header>

        <div class="flex justify-end mb-6">
            <button onclick="openDealModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2px px-6 rounded-lg shadow transition">
                + New Deal
            </button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Active Pipeline</h2>
            <div class="border-t border-gray-200 pt-4">
                <p class="text-gray-500 text-center py-8">Your pipeline deals will appear here once submitted.</p>
            </div>
        </div>
    </div>

    <div id="dealModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-xl shadow-lg w-full max-w-md mx-4 overflow-hidden">
            <div class="bg-blue-600 px-6 py-4 flex justify-between items-center text-white">
                <h3 class="text-lg font-semibold">Add New Deal & Pay</h3>
                <button onclick="closeDealModal()" class="text-white hover:text-gray-200 text-xl font-bold">&times;</button>
            </div>

            <form id="dealForm" onsubmit="event.preventDefault();" class="p-6 space-y-4">
                <div>
                    <label for="dealName" class="block text-sm font-medium text-gray-700 mb-1">Deal Name</label>
                    <input type="text" id="dealName" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                           placeholder="e.g., Shupavu Ride Partnership">
                </div>

                <div>
                    <label for="customerName" class="block text-sm font-medium text-gray-700 mb-1">Customer Name</label>
                    <input type="text" id="customerName" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                           placeholder="e.g., John Doe">
                </div>

                <div>
                    <label for="customerPhone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="tel" id="customerPhone" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                           placeholder="e.g., +254712345678">
                </div>

                <div>
                    <label for="dealAmount" class="block text-sm font-medium text-gray-700 mb-1">Amount (KES)</label>
                    <input type="number" id="dealAmount" required min="1" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                           placeholder="e.g., 5000">
                </div>

                <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">
                    <button type="button" onclick="closeDealModal()" 
                            class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition">
                        Cancel
                    </button>
                    <button type="button" onclick="submitPipelineAndPay()" 
                            class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow transition">
                        Add Deal & Pay
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="pesapal.js"></script>

    <script>
        // Modal Control Functions
        function openDealModal() {
            document.getElementById('dealModal').classList.remove('hidden');
        }

        function closeDealModal() {
            document.getElementById('dealModal').classList.add('hidden');
            document.getElementById('dealForm').reset();
        }

        // Handles the Add Deal Form Submission
        function submitPipelineAndPay() {
            // Retrieve values safely using synchronized HTML IDs
            const dealName = document.getElementById('dealName').value.trim();
            const customerName = document.getElementById('customerName').value.trim();
            const customerPhone = document.getElementById('customerPhone').value.trim();
            const dealAmount = document.getElementById('dealAmount').value.trim();

            // Simple validation check
            if (!dealName || !customerName || !customerPhone || !dealAmount) {
                alert("Please fill in all required fields before proceeding.");
                return;
            }

            console.log("Submitting Deal Details:", { dealName, customerName, customerPhone, dealAmount });

            // Package the data for processing
            const paymentDetails = {
                description: dealName,
                name: customerName,
                phone: customerPhone,
                amount: parseFloat(dealAmount)
            };

            // Close the modal upon initiation
            closeDealModal();

            // Check if processPayment is defined in pesapal.js, then execute
            if (typeof processPayment === "function") {
                processPayment(paymentDetails);
            } else {
                console.error("Error: processPayment function not found in pesapal.js");
                alert("Payment system initialization failed. Please check your console.");
            }
        }
    </script>
</body>
                                                                                                            </html>
