<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoloHub OS - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0B0F19;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 md:p-8">

    <!-- Top Navigation / Header -->
    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white">SoloHub <span class="text-emerald-400">OS</span></h1>
            <p class="text-slate-400 text-sm mt-1">One dashboard. Your entire business operations.</p>
        </div>
        <div class="flex gap-2">
            <button onclick="openModal('taskModal')" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold px-4 py-2 rounded-lg text-sm transition-all shadow-lg shadow-emerald-500/10">
                + New Task
            </button>
            <button onclick="openModal('leadModal')" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-medium px-4 py-2 rounded-lg text-sm transition-all">
                + Add Lead
            </button>
        </div>
    </header>

    <!-- Main Workspace Grid -->
    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Column 1: Active Focus Tasks -->
        <section class="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-6 backdrop-blur-md">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center justify-between">
                <span>Daily Focus</span>
                <span id="taskCount" class="text-xs bg-slate-800 text-emerald-400 px-2.5 py-0.5 rounded-full font-semibold">0 Active</span>
            </h2>
            <div id="taskList" class="space-y-3">
                <!-- Tasks will load here dynamically -->
            </div>
        </section>

        <!-- Column 2: Client Pipeline CRM -->
        <section class="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-6 backdrop-blur-md">
            <h2 class="text-lg font-bold text-white mb-4">Client Pipeline</h2>
            <div id="crmList" class="space-y-3">
                <!-- CRM leads will load here dynamically -->
            </div>
        </section>

        <!-- Column 3: Quick Finance & Metrics -->
        <section class="space-y-6">
            <!-- Finance Tracker Card -->
            <div class="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-6 backdrop-blur-md">
                <h2 class="text-lg font-bold text-white mb-4">Revenue & Expenses</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-emerald-950/20 border border-emerald-900/30 p-4 rounded-xl">
                        <span class="text-xs text-emerald-400 uppercase font-bold tracking-wider">Revenue</span>
                        <div class="text-2xl font-bold mt-1 text-emerald-400">$<span id="revDisplay">0</span></div>
                    </div>
                    <div class="bg-rose-950/20 border border-rose-900/30 p-4 rounded-xl">
                        <span class="text-xs text-rose-400 uppercase font-bold tracking-wider">Expenses</span>
                        <div class="text-2xl font-bold mt-1 text-rose-400">$<span id="expDisplay">0</span></div>
                    </div>
                </div>
                <button onclick="openModal('financeModal')" class="w-full py-2.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 rounded-xl font-medium text-sm transition-all">
                    Log Transaction
                </button>
            </div>
        </section>

    </main>

    <!-- Dialog Modals (Hidden by default) -->
    <!-- Task Modal -->
    <div id="taskModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl w-full max-w-md">
            <h3 class="text-xl font-bold text-white mb-4">Add Focus Task</h3>
            <input id="taskInput" type="text" placeholder="What needs to get done?" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-emerald-500 mb-4">
            <div class="flex justify-end gap-3">
                <button onclick="closeModal('taskModal')" class="px-4 py-2 text-slate-400 hover:text-white text-sm">Cancel</button>
                <button onclick="addTask()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold px-4 py-2 rounded-lg text-sm">Add Task</button>
            </div>
        </div>
    </div>

    <!-- Javascript Logical Wiring -->
    <script>
        // State controllers & storage utilities
        let tasks = JSON.parse(localStorage.getItem('solo_tasks')) || [];
        let leads = JSON.parse(localStorage.getItem('solo_leads')) || [];
        let financials = JSON.parse(localStorage.getItem('solo_fin')) || { rev: 0, exp: 0 };

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            document.getElementById('taskCount').innerText = `${tasks.length} Active`;
            
            if (tasks.length === 0) {
                list.innerHTML = `<p class="text-slate-500 text-sm py-4 text-center">All clear! Add a task to start your focus session.</p>`;
                return;
            }

            tasks.forEach((task, index) => {
                list.innerHTML += `
                    <div class="flex items-center justify-between p-3.5 bg-slate-950/40 border border-slate-800/60 rounded-xl">
                        <span class="text-sm text-slate-300 font-medium">${task}</span>
                        <button onclick="deleteTask(${index})" class="text-xs text-rose-400 hover:text-rose-300 font-medium">Done</button>
                    </div>
                `;
            });
        }

        function addTask() {
            const val = document.getElementById('taskInput').value.trim();
            if(val) {
                tasks.push(val);
                localStorage.setItem('solo_tasks', JSON.stringify(tasks));
                document.getElementById('taskInput').value = '';
                closeModal('taskModal');
                renderTasks();
            }
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            localStorage.setItem('solo_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        // Initial setup run
        renderTasks();
    </script>
</body>
</html>
