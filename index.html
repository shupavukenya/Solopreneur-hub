<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PesaPal Integration Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 {
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .log-box {
            margin-top: 20px;
            background: #272822;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Pay KES via PesaPal</h2>
    <form id="paymentForm">
        <div class="form-group">
            <label for="amount">Amount (KES)</label>
            <input type="number" id="amount" value="100" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" value="test@example.com" required>
        </div>
        <button type="submit" id="payButton">Initiate Payment</button>
    </form>

    <div class="log-box" id="logBox">Status: Ready to test...</div>
</div>

<script>
    // Your actual Sandbox credentials securely loaded
    const CONSUMER_KEY = "qkio1BGGYAXTu2JOfm7XSXNruoZsrqEW";
    const CONSUMER_SECRET = "osGQ364R49cXKeOYSpaOnT++rHs=";

    const logBox = document.getElementById('logBox');
    const payButton = document.getElementById('payButton');

    function logMessage(msg) {
        logBox.innerHTML += `\n> ${msg}`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    document.getElementById('paymentForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        
        const amount = document.getElementById('amount').value;
        const email = document.getElementById('email').value;
        
        payButton.disabled = true;
        payButton.innerText = "Processing...";
        logBox.innerHTML = "Status: Initiating Sandbox flow...";

        try {
            logMessage("Requesting Auth Token from Pesapal...");
            
            // Calling Pesapal v3 Demo Authentication Endpoint
            const response = await fetch('https://cybqa.pesapal.com/pesapalv3/api/Auth/RequestToken', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    "consumer_key": CONSUMER_KEY,
                    "consumer_secret": CONSUMER_SECRET
                })
            });

            if (!response.ok) {
                throw new Error(`Auth failed with status ${response.status}`);
            }

            const data = await response.json();
            
            if (data.token) {
                logMessage("Success! Access Token generated.");
                logMessage(`Token (truncated): ${data.token.substring(0, 25)}...`);
                logMessage(`Expires on: ${data.expiryDate}`);
                
                // Real-world flow would pass this token to:
                // https://cybqa.pesapal.com/pesapalv3/api/Transactions/SubmitOrderRequest
                alert("Authentication Successful! Sandbox setup is complete.");
            } else {
                logMessage("Error: Failed to fetch a valid token.");
            }

        } catch (error) {
            logMessage(`Error: ${error.message}`);
            logMessage("Tip: Cross-Origin (CORS) limits may block frontend browser requests to Pesapal APIs directly. In production, always perform this API call from your Backend Server!");
        } finally {
            payButton.disabled = false;
            payButton.innerText = "Initiate Payment";
        }
    });
</script>

</body>
</html>
